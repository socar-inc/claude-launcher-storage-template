name: 'MCP Setup'
description: 'MCP 서버 설치 및 설정, curl용 시크릿 환경변수 주입'

inputs:
  atlassian_email:
    description: 'ATLASSIAN_EMAIL'
    required: false
    default: ''
  atlassian_api_token:
    description: 'ATLASSIAN_API_TOKEN'
    required: false
    default: ''
  slack_bot_token:
    description: 'SLACK_BOT_TOKEN (curl용 — Slack MCP 미사용)'
    required: false
    default: ''
  datadog_mcp_token:
    description: 'DATADOG_MCP_TOKEN (JSON: {client_id, refresh_token})'
    required: false
    default: ''
  figma_access_token:
    description: 'FIGMA_ACCESS_TOKEN (Personal Access Token)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install MCP servers
      shell: bash
      run: |
        if [ "${{ inputs.atlassian_api_token }}" != "" ]; then
          pip install mcp-atlassian --quiet --break-system-packages && sudo ln -sf ~/.local/bin/mcp-atlassian /usr/local/bin/mcp-atlassian
        fi
        if [ "${{ inputs.figma_access_token }}" != "" ]; then
          npm install -g figma-developer-mcp --silent
          FDM_PATH=$(npm root -g)/figma-developer-mcp
          if [ ! -f /usr/local/bin/figma-developer-mcp ]; then
            sudo ln -sf "${FDM_PATH}/.bin/figma-developer-mcp" /usr/local/bin/figma-developer-mcp 2>/dev/null || true
            sudo ln -sf "$(npm bin -g)/figma-developer-mcp" /usr/local/bin/figma-developer-mcp 2>/dev/null || true
          fi
        fi

    - name: Exchange Datadog OAuth token
      if: ${{ inputs.datadog_mcp_token != '' }}
      shell: bash
      env:
        DATADOG_MCP_TOKEN: ${{ inputs.datadog_mcp_token }}
      run: |
        DD_CLIENT_ID=$(echo "$DATADOG_MCP_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['client_id'])")
        DD_REFRESH=$(echo "$DATADOG_MCP_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
        RESP=$(curl -sf -X POST "https://mcp.datadoghq.com/api/unstable/mcp-server/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=refresh_token&client_id=${DD_CLIENT_ID}&refresh_token=${DD_REFRESH}")
        echo "DATADOG_ACCESS_TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")" >> $GITHUB_ENV

    - name: Generate /tmp/mcp-config.json
      shell: bash
      env:
        ATLASSIAN_EMAIL:     ${{ inputs.atlassian_email }}
        ATLASSIAN_API_TOKEN: ${{ inputs.atlassian_api_token }}
        FIGMA_ACCESS_TOKEN:  ${{ inputs.figma_access_token }}
      run: |
        export ATLASSIAN_EMAIL="${ATLASSIAN_EMAIL//[[:space:]]}"
        export ATLASSIAN_API_TOKEN="${ATLASSIAN_API_TOKEN//[[:space:]]}"
        export FIGMA_ACCESS_TOKEN="${FIGMA_ACCESS_TOKEN//[[:space:]]}"
        envsubst < "${{ github.action_path }}/mcp-config.json" > /tmp/mcp-config.json

    - name: Export curl secrets to environment
      if: ${{ inputs.slack_bot_token != '' }}
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
      run: |
        echo "SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN//[[:space:]]}" >> $GITHUB_ENV

    - name: "[DEBUG] Verify setup"
      shell: bash
      run: |
        echo "=== Secret injection check ==="
        echo "ATLASSIAN_EMAIL set:     ${{ inputs.atlassian_email != '' }}"
        echo "ATLASSIAN_API_TOKEN set: ${{ inputs.atlassian_api_token != '' }}"
        echo "SLACK_BOT_TOKEN set:     ${{ inputs.slack_bot_token != '' }}"
        echo "DATADOG_MCP_TOKEN set:   ${{ inputs.datadog_mcp_token != '' }}"
        echo "FIGMA_ACCESS_TOKEN set:  ${{ inputs.figma_access_token != '' }}"
        echo "=== /tmp/mcp-config.json (tokens masked) ==="
        if [ -f /tmp/mcp-config.json ]; then
          cat /tmp/mcp-config.json \
            | sed 's/"ATLASSIAN_API_TOKEN": "[^"]*"/"ATLASSIAN_API_TOKEN": "***"/g' \
            | sed 's/"ATLASSIAN_EMAIL": "[^"]*"/"ATLASSIAN_EMAIL": "***"/g' \
            | sed 's/"Authorization": "Bearer [^"]*"/"Authorization": "Bearer ***"/g' \
            | sed 's/"FIGMA_API_KEY": "[^"]*"/"FIGMA_API_KEY": "***"/g'
        else
          echo "(mcp-config.json not generated — MCP not used)"
        fi
        echo "=== MCP binary check ==="
        echo "mcp-atlassian:       $(which mcp-atlassian 2>/dev/null || echo 'not installed')"
        echo "figma-developer-mcp: $(which figma-developer-mcp 2>/dev/null || echo 'not installed')"
