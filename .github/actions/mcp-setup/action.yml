name: 'MCP Setup'
description: 'mcp-config.json 을 읽어 ${VAR} 치환 후 /tmp/mcp-config.json 으로 저장'

inputs:
  github_token:
    description: 'GITHUB_PERSONAL_ACCESS_TOKEN'
    required: false
    default: ''
  atlassian_email:
    description: 'ATLASSIAN_EMAIL'
    required: false
    default: ''
  atlassian_api_token:
    description: 'ATLASSIAN_API_TOKEN'
    required: false
    default: ''
  slack_bot_token:
    description: 'SLACK_BOT_TOKEN'
    required: false
    default: ''
  dd_api_key:
    description: 'DD_API_KEY'
    required: false
    default: ''
  dd_app_key:
    description: 'DD_APP_KEY'
    required: false
    default: ''
  figma_access_token:
    description: 'FIGMA_ACCESS_TOKEN'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install MCP servers
      shell: bash
      run: |
        curl -sL https://github.com/github/github-mcp-server/releases/latest/download/github-mcp-server_Linux_x86_64.tar.gz | tar xz
        sudo mv github-mcp-server /usr/local/bin/
        pip install mcp-atlassian --quiet --break-system-packages && sudo ln -sf ~/.local/bin/mcp-atlassian /usr/local/bin/mcp-atlassian
        npm install -g figma-developer-mcp --silent

    - name: Generate /tmp/mcp-config.json
      shell: bash
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: ${{ inputs.github_token }}
        ATLASSIAN_EMAIL:              ${{ inputs.atlassian_email }}
        ATLASSIAN_API_TOKEN:          ${{ inputs.atlassian_api_token }}
        SLACK_BOT_TOKEN:              ${{ inputs.slack_bot_token }}
        DD_API_KEY:                   ${{ inputs.dd_api_key }}
        DD_APP_KEY:                   ${{ inputs.dd_app_key }}
        FIGMA_ACCESS_TOKEN:           ${{ inputs.figma_access_token }}
      run: |
        # 개행/공백 제거 후 치환 (헤더 값 유효성 보장)
        export GITHUB_PERSONAL_ACCESS_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN//[$'\t\r\n ']}"
        export ATLASSIAN_EMAIL="${ATLASSIAN_EMAIL//[$'\t\r\n ']}"
        export ATLASSIAN_API_TOKEN="${ATLASSIAN_API_TOKEN//[$'\t\r\n ']}"
        export SLACK_BOT_TOKEN="${SLACK_BOT_TOKEN//[$'\t\r\n ']}"
        export DD_API_KEY="${DD_API_KEY//[$'\t\r\n ']}"
        export DD_APP_KEY="${DD_APP_KEY//[$'\t\r\n ']}"
        export FIGMA_ACCESS_TOKEN="${FIGMA_ACCESS_TOKEN//[$'\t\r\n ']}"
        envsubst < "${{ github.action_path }}/mcp-config.json" > /tmp/mcp-config.json
